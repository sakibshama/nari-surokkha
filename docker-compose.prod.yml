# ============================================================
# Nari Surokkha — Production stack for a single VPS
#
# Bring up:   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# Migrate:    docker compose -f docker-compose.prod.yml --env-file .env.production run --rm api npx prisma migrate deploy
# Logs:       docker compose -f docker-compose.prod.yml logs -f api
#
# Images are pulled from your container registry in CI/CD (REGISTRY + TAG),
# and fall back to building locally if not present.
# ============================================================

services:
  # ─── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nari_surokkha}
      POSTGRES_USER: ${POSTGRES_USER:-nari_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nari_user} -d ${POSTGRES_DB:-nari_surokkha}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [internal]

  # ─── API (Fastify) ─────────────────────────────────────────
  api:
    image: ${REGISTRY:-nari-surokkha}/api:${TAG:-latest}
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file: [.env.production]
    environment:
      NODE_ENV: production
      # Evidence stored on the server disk (bind-mounted for backups).
      STORAGE_LOCAL_DIR: /app/uploads
    volumes:
      - ${UPLOADS_DIR:-./data/uploads}:/app/uploads
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ─── ML Service (FastAPI) — internal only ──────────────────
  ml-service:
    image: ${REGISTRY:-nari-surokkha}/ml-service:${TAG:-latest}
    build:
      context: .
      dockerfile: services/ml-service/Dockerfile
    restart: unless-stopped
    environment:
      ML_SERVICE_API_KEY: ${ML_SERVICE_API_KEY:?ML_SERVICE_API_KEY is required}
      ML_ALLOWED_ORIGINS: http://api:3001
    networks: [internal]

  # ─── Admin Portal (static, nginx) ──────────────────────────
  admin-portal:
    image: ${REGISTRY:-nari-surokkha}/admin-portal:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
      args:
        VITE_API_URL: ${ADMIN_VITE_API_URL:?ADMIN_VITE_API_URL is required}
        VITE_WS_URL: ${PUBLIC_WS_URL:?PUBLIC_WS_URL is required}
    restart: unless-stopped
    networks: [internal]

  # ─── Police Portal (static, nginx) ─────────────────────────
  police-portal:
    image: ${REGISTRY:-nari-surokkha}/police-portal:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/police-portal/Dockerfile
      args:
        VITE_API_URL: ${POLICE_VITE_API_URL:?POLICE_VITE_API_URL is required}
        VITE_WS_URL: ${PUBLIC_WS_URL:?PUBLIC_WS_URL is required}
    restart: unless-stopped
    networks: [internal]

  # ─── TURN relay (WebRTC across NAT/CGNAT — required for live
  #     streaming when phone and portal are on different networks) ─
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    # Host networking: TURN must advertise the real public IP and use a
    # UDP relay port range — Docker NAT breaks both.
    network_mode: host
    command: >
      -n --log-file=stdout
      --fingerprint --lt-cred-mech
      --realm=mystrix-soft.com
      --user=nari:${TURN_PASSWORD:?TURN_PASSWORD is required}
      --listening-port=3478
      --min-port=49152 --max-port=49200
      --no-cli --no-tlsv1 --no-tlsv1_1

  # ─── Edge Nginx (TLS termination + reverse proxy) ──────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Injected into the config template at container start (envsubst).
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      # Only substitute ${DOMAIN}; leave nginx's own $host/$uri vars intact.
      NGINX_ENVSUBST_FILTER: DOMAIN
    volumes:
      - ./deploy/production/nginx/nari-surokkha.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./data/certbot-www:/var/www/certbot
    depends_on: [api, admin-portal, police-portal]
    networks: [internal]

volumes:
  pg_data:
  redis_data:

networks:
  internal:
    driver: bridge
