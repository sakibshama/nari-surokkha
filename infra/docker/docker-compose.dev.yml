version: '3.9'

# ============================================================
# Nari Surokkha — Docker Compose (Development)
# Starts: PostgreSQL + PostGIS, Redis, MinIO (S3), MailHog
# Does NOT start the app services — run them with `npm run dev`
# ============================================================

services:

  # ─── PostgreSQL + PostGIS ─────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nari_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nari_surokkha_dev
      POSTGRES_USER: nari_user
      POSTGRES_PASSWORD: nari_dev_password_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - nari_postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nari_user -d nari_surokkha_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nari_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - nari_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible for evidence storage) ────────────
  minio:
    image: minio/minio:latest
    container_name: nari_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev_change_in_prod
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - nari_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO Init (create buckets on start) ─────────────────
  minio-init:
    image: minio/mc:latest
    container_name: nari_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin_dev_change_in_prod;
      mc mb local/nari-evidence --ignore-existing;
      mc mb local/nari-public --ignore-existing;
      mc anonymous set download local/nari-public;
      echo 'MinIO buckets ready.';
      "
    restart: on-failure

  # ─── Redis Commander (Dev UI for Redis) ───────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nari_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - tools

volumes:
  nari_postgres_data:
  nari_redis_data:
  nari_minio_data:

networks:
  default:
    name: nari_network
