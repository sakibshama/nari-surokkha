version: '3.9'

# ============================================================
# Nari Surokkha — Docker Compose (Production/Staging)
# All services including API, Police Portal, ML Service
# WARNING: Fill ALL environment variables from .env.example
# before deploying to any real environment
# ============================================================

services:

  # ─── PostgreSQL + PostGIS ─────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nari_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - nari_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nari_internal

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nari_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - nari_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nari_internal

  # ─── Backend API ──────────────────────────────────────────
  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: nari_api
    restart: always
    env_file:
      - ../../services/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nari_internal
      - nari_external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── ML Service ───────────────────────────────────────────
  ml-service:
    build:
      context: ../../services/ml-service
      dockerfile: Dockerfile
    container_name: nari_ml
    restart: always
    env_file:
      - ../../services/ml-service/.env
    networks:
      - nari_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Police Portal ────────────────────────────────────────
  police-portal:
    build:
      context: ../../apps/police-portal
      dockerfile: Dockerfile
    container_name: nari_police_portal
    restart: always
    networks:
      - nari_internal

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nari_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - police-portal
    networks:
      - nari_external

volumes:
  nari_postgres_data:
  nari_redis_data:

networks:
  nari_internal:
    internal: true
  nari_external:
    name: nari_external
